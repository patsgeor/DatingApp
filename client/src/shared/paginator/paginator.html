<div class="flex items-center w-full gap-3 py-3">
    <div>
        <span>Items per page:</span>
        <select class="select w-24" (change)="onPageChange(undefined,$event.target)">
            @for (item of selectPage; track $index) {
            <option [value]="item" [selected]="item===pageSize()">{{item}}</option>
            }
        </select>
    </div>
    <div class="text-sm">
        {{(pageNumber()-1)*pageSize()}} - {{lastItemIndex()}} of {{totalCount()}}
    </div>

    <div class="flex items-center gap-2">
        <button type="button" class="btn btn-circle btn-ghost"
        [disabled]="pageNumber()===1"
        (click)="onPageChange(pageNumber()-1)">
            &larr; 
        </button>
        <button type="button" class="btn btn-circle btn-ghost"
        [disabled]="pageNumber()===totalPages()"
        (click)="onPageChange(pageNumber()+1)">
            &rarr; 
        </button>
    </div>
</div>
