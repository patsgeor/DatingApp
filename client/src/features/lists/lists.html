@if(paginatedMembers(); as paginatedResult) {
  <div class="flex flex-col w-full ">
    <div class="flex justify-between items-center">

      <div role="tablist" class="tabs tabs-box tabs-lg text-primary w-fit mb-3">
        @for (tab of tabs; track $index) {
          <button role="tab" class="tab" [class.tab-active]="likesParams.predicate===tab.value"
          (click)="setPredicate(tab.value)"
          >{{tab.label}}</button>
        }  
      </div>
      @if(paginatedResult.metadata; as metadata){
            <app-paginator  [pageNumber]="metadata.currentPage" 
                            [totalCount]="metadata.totalCount"
                            [totalPages]="metadata.totalPages" 
                            [pageSize]="metadata.pageSize" 
                            (pageChange)="onPagechange($event)" />
            
        }       
    </div>
    @if(paginatedResult.items; as members) {
        <div class="grid grid-cols-5 gap-3">
            @for (member of members ; track member.id) {
            <app-member-card [member]="member" />
            }
        </div>
    }
    @else{
      <div class="text-xl mt-3">There are no results!</div>
    }
</div>
}
