<h2 class="text-2xl font-bold mb-4">Members</h2>
@if(paginatedMembers(); as paginatedResult) {
<div class="flex flex-col w-full ">
    <div class="flex justify-between items-center">
        <div class="flex gap-3 items-center">
            <button type="button" class="btn btn-primary" (click)="openModal()">
                Select Filter
            </button>
            <button type="button" class="btn btn-neutral" (click)="resetParams()">
                Reset Filter
            </button>
            <div class=" text-lg text-primary bg-base-100 py-2 px-4 border rounded-lg capitalize">
                {{displayFilter}}
            </div>
        </div>
        @if(paginatedResult.metadata; as metadata){
            <app-paginator  [pageNumber]="metadata.currentPage" 
                            [totalCount]="metadata.totalCount"
                            [totalPages]="metadata.totalPages" 
                            [pageSize]="metadata.pageSize" 
                            (pageChange)="onPagechange($event)" />
            
        }       
    </div>
    @if(paginatedResult.items; as members) {
        <div class="grid grid-cols-5 gap-3">
            @for (member of members ; track member.id) {
            <app-member-card [member]="member" />
            }
        </div>
    }
</div>
}

<app-filter-modal #filterModal 
            [hidden]="!paginatedMembers()"
            (submitFilter)="onFilterChange($event)"
            (closeModal)="onClose()" 
            [memberParams]="memberParams"/>
